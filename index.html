<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Analyzer for Beginners</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Stock Analyzer for Beginners</h1>
  <p>Real-time market data · For educational purposes only</p>
</header>

<!-- Onglets -->
<div class="tabs">
  <button id="tabAnalyze" class="tab tab-active" onclick="showAnalyzeTab()">Analyze</button>
  <button id="tabWatchlist" class="tab" onclick="showWatchlistTab()">Watchlist <span id="wlCount"></span></button>
  <button id="tabHistory" class="tab" onclick="showHistoryTab()">History <span id="histCount"></span></button>
</div>

<!-- Vue Analyze -->
<div id="analyzeView">
  <div class="search-box">
    <div class="input-row">
      <input type="text" id="ticker" placeholder="Company name or ticker…" maxlength="15"/>
      <button id="btn" onclick="analyze()">Analyze</button>
    </div>
    <div class="chips">
      <button class="chip" onclick="setTicker('AAPL')">AAPL</button>
      <button class="chip" onclick="setTicker('TSLA')">TSLA</button>
      <button class="chip" onclick="setTicker('MSFT')">MSFT</button>
      <button class="chip" onclick="setTicker('GOOGL')">GOOGL</button>
      <button class="chip" onclick="setTicker('NVDA')">NVDA</button>
      <button class="chip" onclick="setTicker('AMZN')">AMZN</button>
      <button class="chip" onclick="setTicker('META')">META</button>
    </div>
  </div>
  <div class="status" id="status"></div>
  <div class="error-msg" id="error"></div>
  <div class="card" id="card"></div>
</div>

<!-- Vue Watchlist -->
<div id="watchlistView" style="display:none;width:100%;max-width:1100px;">
  <div class="card" style="display:block;margin-top:16px;">
    <div class="view-header">My Watchlist</div>
    <div id="watchlistContent"></div>
  </div>
</div>

<!-- Vue History -->
<div id="historyView" style="display:none;width:100%;max-width:700px;">
  <div class="card" style="display:block;margin-top:16px;">
    <div class="view-header">Session History</div>
    <div id="historyContent"></div>
  </div>
</div>

<footer>For informational purposes only · Not financial advice</footer>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/markdown.js"></script>
<script src="js/render.js"></script>
<script src="js/search.js"></script>
<script src="js/analyze.js"></script>
<script src="js/watchlist.js"></script>
<script src="js/history.js"></script>
<script>
  function setTicker(s) { document.getElementById('ticker').value = s; closeDropdown(); analyze(); }
  document.getElementById('ticker').addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });
  initSearch();
  // updateWlCount et updateHistoryCount sont définies dans watchlist.js et history.js
  if (typeof updateWlCount === 'function') updateWlCount();
  if (typeof updateHistoryCount === 'function') updateHistoryCount();
  initSession();
</script>

</body>
</html>
